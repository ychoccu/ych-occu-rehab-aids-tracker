<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復康用品價格比較 | HK Rehab Price Tracke | 仁濟醫院職業治療部r</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group label {
            font-weight: 600;
            color: #333;
        }
        select, input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        select:focus, input:focus {
            border-color: #667eea;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .supplier-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .badge-healthtop { background: #e3f2fd; color: #1976d2; }
        .badge-rehabexpress { background: #f3e5f5; color: #7b1fa2; }
        .badge-easy66 { background: #fff3e0; color: #f57c00; }
        .badge-justmed { background: #e8f5e9; color: #388e3c; }
        .badge-nero { background: #fce4ec; color: #c2185b; }
        .badge-supreme { background: #e0f2f1; color: #00796b; }
        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin: 10px 0;
            line-height: 1.4;
        }
        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            margin: 10px 0;
        }
        .product-meta {
            font-size: 0.9rem;
            color: #666;
            margin: 5px 0;
        }
        .updated-date {
            font-size: 0.85rem;
            color: #999;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            color: #666;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .subtitle { font-size: 1rem; }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦽 復康用品價格比較</h1>
            <p class="subtitle">比較香港6間供應商的復康用品價格 | 每日自動更新</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label>類別:</label>
                <select id="categoryFilter">
                    <option value="all">全部</option>
                    <option value="wheelchair">輪椅</option>
                    <option value="shower">沐浴椅</option>
                    <option value="toilet">廁所用品</option>
                    <option value="handrail">扶手</option>
                    <option value="bedrail">床欄</option>
                    <option value="ramp">斜台</option>
                    <option value="walker">助行器</option>
                </select>

                <label>供應商:</label>
                <select id="supplierFilter">
                    <option value="all">全部</option>
                    <option value="healthtop">唯健康 Healthtop</option>
                    <option value="rehabexpress">復康速遞</option>
                    <option value="easy66">EASY66</option>
                    <option value="justmed">Just Med Limited</option>
                    <option value="nero">Nero Medical</option>
                    <option value="supreme">Supreme Medical</option>
                </select>

                <label>搜尋:</label>
                <input type="text" id="searchInput" placeholder="輸入產品名稱...">
            </div>
        </div>

        <div id="productsContainer">
            <div class="loading">正在載入產品資料...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tgirhkngkacpbvwpzbrq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnaXJoa25na2FjcGJ2d3B6YnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDczMTc1MTksImV4cCI6MjA2Mjg5MzUxOX0.c1uGZP7tWM0Rl9mEHh_JVLhKpqB8jlHNZEFRJwPg1wc';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allProducts = [];

        const supplierNames = {
            'healthtop': '唯健康',
            'rehabexpress': '復康速遞',
            'easy66': 'EASY66',
            'justmed': 'Just Med',
            'nero': 'Nero Medical',
            'supreme': 'Supreme Medical'
        };

        async function loadProducts() {
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('updated_date', { ascending: false });
                
                if (error) throw error;
                
                allProducts = data || [];
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsContainer').innerHTML = 
                    '<div class="no-results">載入失敗，請稍後再試</div>';
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="no-results">暫無產品資料</div>';
                return;
            }

            const html = '<div class="products-grid">' + 
                products.map(product => `
                    <div class="product-card">
                        <span class="supplier-badge badge-${product.source}">
                            ${supplierNames[product.source] || product.source_name}
                        </span>
                        <div class="product-name">${product.product_name}</div>
                        <div class="price">${product.price_display || '請查詢'}</div>
                        <div class="product-meta">型號: ${product.model || 'N/A'}</div>
                        ${product.phone ? `<div class="product-meta">📞 ${product.phone}</div>` : ''}
                        <div class="updated-date">更新: ${product.updated_date || 'N/A'}</div>
                    </div>
                `).join('') +
                '</div>';
            
            container.innerHTML = html;
        }

        function filterProducts() {
            const category = document.getElementById('categoryFilter').value;
            const supplier = document.getElementById('supplierFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allProducts;

            if (category !== 'all') {
                filtered = filtered.filter(p => p.category === category);
            }

            if (supplier !== 'all') {
                filtered = filtered.filter(p => p.source === supplier);
            }

            if (search) {
                filtered = filtered.filter(p => 
                    p.product_name.toLowerCase().includes(search) ||
                    p.model.toLowerCase().includes(search)
                );
            }

            displayProducts(filtered);
        }

        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('supplierFilter').addEventListener('change', filterProducts);
        document.getElementById('searchInput').addEventListener('input', filterProducts);

        loadProducts();
    </script>
</body>
</html>
