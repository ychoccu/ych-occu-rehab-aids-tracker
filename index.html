<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>仁濟醫院職業治療部 - 輔助工具價格比較</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      min-height: 100vh;
      padding: 20px;
    }
    .header { text-align: center; color: white; padding: 30px 20px 20px; }
    .header h1 { font-size: 2em; font-weight: bold; margin-bottom: 8px; }
    .header h2 { font-size: 1.3em; font-weight: normal; margin-bottom: 8px; }
    .header p  { font-size: 0.9em; opacity: 0.85; }
    .controls {
      background: white; border-radius: 12px; padding: 16px;
      margin: 16px auto; max-width: 1000px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }
    .controls select, .controls input {
      padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px;
      font-size: 0.95em; flex: 1; min-width: 160px;
    }
    .controls button {
      padding: 8px 20px; background: #27ae60; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.95em;
    }
    .controls button:hover { background: #219150; }
    #compare-bar {
      display: none; background: #fff3cd; border-radius: 12px;
      padding: 14px 20px; margin: 0 auto 12px; max-width: 1000px; text-align: center;
    }
    #compare-bar button {
      margin: 4px 8px; padding: 8px 18px; border: none;
      border-radius: 8px; cursor: pointer; font-size: 0.9em;
    }
    #btn-compare { background: #e67e22; color: white; }
    #btn-clear   { background: #aaa; color: white; }
    #product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; max-width: 1000px; margin: 0 auto;
    }
    .card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; gap: 8px;
    }
    .card img {
      width: 100%; height: 160px; object-fit: contain;
      border-radius: 8px; background: #f5f5f5;
    }
    .card .no-img {
      width: 100%; height: 160px; background: #f0f0f0; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 2em;
    }
    .card h3 { font-size: 1em; font-weight: bold; color: #2c3e50; }
    .card .model { font-size: 0.8em; color: #888; }
    .card .price { font-size: 1.2em; color: #e74c3c; font-weight: bold; }
    .card .source { font-size: 0.8em; color: #27ae60; }
    .card .updated { font-size: 0.75em; color: #aaa; }
    .card .specs { font-size: 0.8em; color: #555; }
    .card label { display: flex; align-items: center; gap: 6px; font-size: 0.85em; cursor: pointer; }
    .card .actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .card .actions a {
      flex: 1; text-align: center; padding: 8px 6px;
      border-radius: 8px; text-decoration: none;
      font-size: 0.85em; font-weight: 600;
      transition: opacity 0.2s;
    }
    .card .actions a:active { opacity: 0.7; }
    .card .actions .btn-call {
      background: #27ae60; color: white;
    }
    .card .actions .btn-web {
      background: #3498db; color: white;
    }
    #compare-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 999; overflow-y: auto; padding: 20px;
    }
    #compare-modal .modal-inner {
      background: white; border-radius: 12px; max-width: 960px;
      margin: 0 auto; padding: 24px;
    }
    #compare-modal h2 { margin-bottom: 16px; color: #2c3e50; }
    #compare-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    #compare-table th { background: #27ae60; color: white; padding: 10px; }
    #compare-table td { padding: 10px; border: 1px solid #ddd; vertical-align: top; }
    #compare-table tr:nth-child(even) td { background: #f9f9f9; }
    #btn-close-modal {
      margin-top: 16px; padding: 10px 24px; background: #e74c3c;
      color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em;
    }
    #status { text-align: center; color: white; padding: 40px; font-size: 1.1em; }
  </style>
</head>
<body>

<div class="header">
  <h1>仁濟醫院職業治療部</h1>
  <h2>輔助工具</h2>
  <p>價格只作參考，詳情請查詢相關的復康公司</p>
</div>

<div class="controls">
  <select id="filter-category">
    <option value="">所有類別</option>
    <option value="wheelchair">輪椅</option>
    <option value="shower">沐浴椅</option>
    <option value="toilet">便椅 / 廁所加高</option>
    <option value="handrail">扶手</option>
    <option value="bedrail">床邊扶手</option>
    <option value="ramp">斜台板</option>
    <option value="bathboard">沐浴板</option>
    <option value="mattress">氣墊床褥</option>
    <option value="walker">助行架</option>
  </select>
  <select id="filter-source"><option value="">所有供應商</option></select>
  <input id="search-input" type="text" placeholder="搜尋產品名稱..." />
  <button onclick="applyFilters()">搜尋</button>
</div>

<div id="compare-bar">
  已選 <span id="compare-count">0</span> 件產品（最多4件）
  <button id="btn-compare" onclick="showCompare()">比較</button>
  <button id="btn-clear" onclick="clearCompare()">清除</button>
</div>

<div id="product-grid"><div id="status">正在載入產品資料...</div></div>

<div id="compare-modal">
  <div class="modal-inner">
    <h2>產品比較</h2>
    <div style="overflow-x:auto"><table id="compare-table"></table></div>
    <button id="btn-close-modal" onclick="closeCompare()">關閉</button>
  </div>
</div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/h9ctddp2cm-debug/hk-rehab-price-tracker/main/products.json';
let allProducts = [];
let compareList = [];
window._compareData = {};

const CATEGORY_LABELS = {
  wheelchair:'輪椅', shower:'沐浴椅', toilet:'便椅/廁所加高',
  handrail:'扶手', bedrail:'床邊扶手', ramp:'斜台板',
  bathboard:'沐浴板', mattress:'氣墊床褥', walker:'助行架'
};

async function loadProducts() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allProducts = Array.isArray(data) ? data : (data.products || []);
    if (allProducts.length === 0) throw new Error('資料庫暫時沒有產品');
    populateSourceFilter();
    renderCards(allProducts);
  } catch (e) {
    document.getElementById('product-grid').innerHTML =
      '<div id="status">載入失敗：' + e.message + '</div>';
  }
}

function populateSourceFilter() {
  const sources = [...new Set(allProducts.map(p => p.source_name || p.source).filter(Boolean))];
  const sel = document.getElementById('filter-source');
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s; sel.appendChild(opt);
  });
}

function renderCards(products) {
  const grid = document.getElementById('product-grid');
  if (products.length === 0) {
    grid.innerHTML = '<div id="status">找不到符合條件的產品</div>'; return;
  }
  grid.innerHTML = '';
  products.forEach((p, i) => {
    const id = p.id || i;
    const card = document.createElement('div');
    card.className = 'card';
    const imgHTML = p.image_url
      ? `<img src="${p.image_url}" alt="${p.product_name || ''}" onerror="this.style.display='none'">`
      : `<div class="no-img">🦽</div>`;
    const specs = parseJSON(p.specs);
    const specsHTML = specs.length ? `<div class="specs">${specs.slice(0,3).join(' · ')}</div>` : '';
    const checked = compareList.includes(String(id)) ? 'checked' : '';
    const pData = JSON.stringify(p).replace(/\\/g,'\\\\').replace(/"/g,'&quot;');
    const phoneClean = (p.phone || '').replace(/\s+/g, '');
    const callBtn = phoneClean
      ? `<a class="btn-call" href="tel:${phoneClean}">📞 ${p.phone}</a>`
      : '';
    const webBtn = p.product_url
      ? `<a class="btn-web" href="${p.product_url}" target="_blank" rel="noopener">🌐 產品網頁</a>`
      : '';
    const actionsHTML = (callBtn || webBtn)
      ? `<div class="actions">${callBtn}${webBtn}</div>`
      : '';
    card.innerHTML = `
      ${imgHTML}
      <h3>${p.product_name || '未知產品'}</h3>
      <div class="model">${p.model || ''}</div>
      <div class="price">${p.price_display || 'HK$ N/A'}</div>
      <div class="source">📦 ${p.source_name || p.source || ''}</div>
      ${specsHTML}
      ${actionsHTML}
      <div class="updated">更新：${p.updated_date || p.last_checked || 'N/A'}</div>
      <label><input type="checkbox" ${checked} data-id="${id}" data-product="${pData}" onchange="toggleCompare(this)"> 加入比較</label>
    `;
    grid.appendChild(card);
  });
}

function parseJSON(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  try { return JSON.parse(val); } catch { return []; }
}

function applyFilters() {
  const cat = document.getElementById('filter-category').value;
  const src = document.getElementById('filter-source').value;
  const q   = document.getElementById('search-input').value.toLowerCase();
  renderCards(allProducts.filter(p => {
    return (!cat || p.category === cat)
        && (!src || (p.source_name || p.source) === src)
        && (!q   || (p.product_name||'').toLowerCase().includes(q) || (p.model||'').toLowerCase().includes(q));
  }));
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key==='Enter') applyFilters(); });

function toggleCompare(checkbox) {
  const id = String(checkbox.dataset.id);
  if (checkbox.checked) {
    if (compareList.length >= 4) { alert('最多選4件產品'); checkbox.checked = false; return; }
    compareList.push(id);
    const raw = checkbox.dataset.product.replace(/&quot;/g,'"');
    try { window._compareData[id] = JSON.parse(raw); } catch(e) {}
  } else {
    compareList = compareList.filter(x => x !== id);
    delete window._compareData[id];
  }
  updateCompareBar();
}

function updateCompareBar() {
  document.getElementById('compare-count').textContent = compareList.length;
  document.getElementById('compare-bar').style.display = compareList.length > 0 ? 'block' : 'none';
}

function clearCompare() {
  compareList = []; window._compareData = {}; updateCompareBar();
  document.querySelectorAll('.card input[type=checkbox]').forEach(c => c.checked = false);
}

function showCompare() {
  const items = compareList.map(id => window._compareData[id]).filter(Boolean);
  if (items.length < 2) { alert('請選至少2件產品'); return; }
  const rows = [
    ['產品名稱', p => p.product_name||'-'],
    ['型號',     p => p.model||'-'],
    ['價格',     p => p.price_display||'-'],
    ['供應商',   p => p.source_name||p.source||'-'],
    ['類別',     p => CATEGORY_LABELS[p.category]||p.category||'-'],
    ['規格',     p => parseJSON(p.specs).join('<br>')||'-'],
    ['電話',     p => {
      if (!p.phone) return '-';
      const clean = p.phone.replace(/\s+/g, '');
      return `<a href="tel:${clean}" style="color:#27ae60;font-weight:600;text-decoration:none">📞 ${p.phone}</a>`;
    }],
    ['網頁',     p => p.product_url
      ? `<a href="${p.product_url}" target="_blank" rel="noopener" style="color:#3498db;text-decoration:none">🌐 產品網頁</a>`
      : '-'],
    ['更新日期', p => p.updated_date||'-'],
  ];
  let html = '<tr><th>項目</th>' + items.map(p=>`<th>${p.product_name||'-'}</th>`).join('') + '</tr>';
  rows.forEach(([label, fn]) => {
    html += `<tr><td><strong>${label}</strong></td>` + items.map(p=>`<td>${fn(p)}</td>`).join('') + '</tr>';
  });
  document.getElementById('compare-table').innerHTML = html;
  document.getElementById('compare-modal').style.display = 'block';
}

function closeCompare() { document.getElementById('compare-modal').style.display = 'none'; }

loadProducts();
</script>
</body>
</html>
