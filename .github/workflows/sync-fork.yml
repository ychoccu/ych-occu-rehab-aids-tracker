name: Sync fork from upstream
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Sync upstream (excluding .github/workflows to avoid GITHUB_TOKEN workflow-scope restriction)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/h9ctddp2cm-debug/ych-occu-rehab-aids-tracker.git
          git fetch upstream main

          # Save fork's own workflows directory (we will NOT overwrite it from upstream)
          mkdir -p /tmp/fork-workflows-backup
          if [ -d .github/workflows ]; then
            cp -r .github/workflows/. /tmp/fork-workflows-backup/ 2>/dev/null || true
          fi

          # Hard-reset working tree to upstream (gets latest data, scripts, html, images)
          git reset --hard upstream/main

          # Restore fork's workflows directory (overwrites any workflow files from upstream)
          rm -rf .github/workflows
          mkdir -p .github/workflows
          if [ "$(ls -A /tmp/fork-workflows-backup 2>/dev/null)" ]; then
            cp -r /tmp/fork-workflows-backup/. .github/workflows/
          fi

          # Commit the reverted workflows so the push doesn't touch .github/workflows on remote
          git add .github/workflows
          if ! git diff --cached --quiet; then
            git commit -m "chore(sync): preserve fork-local workflows"
          fi

          git push origin main --force-with-lease
      - name: Summary
        run: echo "Sync completed at $(date)"
