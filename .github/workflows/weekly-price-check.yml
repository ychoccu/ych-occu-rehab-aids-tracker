name: Weekly Price Check

on:
  schedule:
    # Monday 8am HKT = Monday 0:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not commit changes)"
        required: false
        default: "false"
        type: string

jobs:
  price-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check DASHSCOPE_API_KEY is set
        run: |
          if [ -z "$DASHSCOPE_API_KEY" ]; then
            echo "ERROR: DASHSCOPE_API_KEY secret is not set."
            echo "Please add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "DASHSCOPE_API_KEY is present (length: ${#DASHSCOPE_API_KEY})"
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run unit tests (safety logic must pass)
        run: python scripts/test_price_checker.py

      - name: Run price checker
        run: python scripts/price_checker.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Check for changes in products.json
        id: check_changes
        run: |
          if git diff --quiet products.json ych_rehab_aids_standalone.html 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No price changes detected — will still commit last_checked timestamps."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Price changes detected — will commit."
          fi

      - name: Commit and push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          if git diff --quiet products.json ych_rehab_aids_standalone.html 2>/dev/null; then
            echo "Nothing to commit."
            exit 0
          fi
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json ych_rehab_aids_standalone.html
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            git commit -m "Weekly auto price check: price changes detected"
          else
            git commit -m "Weekly auto price check: no price changes, updated last_checked"
          fi
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run notice
        if: github.event.inputs.dry_run == 'true'
        run: echo "DRY RUN — no commits made.
